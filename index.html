<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesPardes Payroll Pro</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase & Parsers -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <!-- Google Fonts: Inter for a clean, modern look -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-body: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent-primary: #2563eb; /* Professional Blue */
      --accent-hover: #1d4ed8;
      --border-color: #e2e8f0;
    }
    
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-primary); }
    
    /* --- Sidebar Styling --- */
    .sidebar { background: white; border-right: 1px solid var(--border-color); }
    .sidebar-item { 
      color: var(--text-secondary); 
      font-weight: 500; 
      transition: all 0.2s; 
      border-left: 3px solid transparent; 
    }
    .sidebar-item:hover { color: var(--accent-primary); background-color: #f1f5f9; }
    .sidebar-item.active { 
      color: var(--accent-primary); 
      background-color: #eff6ff; 
      border-left-color: var(--accent-primary);
    }
    
    /* --- Card Styling (Glass/Material Look) --- */
    .card { 
      background: var(--card-bg); 
      border-radius: 16px; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02); 
      border: 1px solid var(--border-color); 
    }
    .card-header { border-bottom: 1px solid var(--border-color); padding: 20px 24px; }
    
    /* --- Hero Section (Dashboard) --- */
    .hero-section {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 20px;
      color: white;
      padding: 32px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    /* Subtle background pattern for hero */
    .hero-section::before {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* --- Buttons --- */
    .btn-primary { 
      background: var(--accent-primary); 
      color: white; 
      padding: 10px 20px; 
      border-radius: 10px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s; 
      border: none; 
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3); }
    
    .btn-secondary { 
      background: white; 
      color: var(--text-primary); 
      padding: 10px 20px; 
      border-radius: 10px; 
      font-weight: 500; 
      cursor: pointer; 
      transition: all 0.2s; 
      border: 1px solid var(--border-color); 
    }
    .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
    
    .btn-danger { 
      background: #ef4444; 
      color: white; 
      padding: 10px 20px; 
      border-radius: 10px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s; 
      border: none; 
    }
    .btn-danger:hover { background: #dc2626; }

    /* --- Inputs --- */
    .input-field { 
      width: 100%; 
      padding: 12px 16px; 
      border: 1px solid var(--border-color); 
      border-radius: 10px; 
      font-size: 14px; 
      transition: all 0.2s; 
      background-color: #fff;
    }
    .input-field:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

    /* --- Tables --- */
    .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); }
    table { width: 100%; border-collapse: collapse; }
    th { background-color: #f8fafc; color: var(--text-secondary); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background-color: #f8fafc; }

    /* --- Payroll Grid Inputs --- */
    .payroll-input { 
      width: 100%; 
      padding: 8px; 
      border: 1px solid #e2e8f0; 
      border-radius: 6px; 
      font-size: 13px; 
      text-align: right; 
      transition: all 0.15s;
    }
    .payroll-input:focus { border-color: var(--accent-primary); outline: none; background: #eff6ff; }
    .payroll-input.net { background-color: #f0fdf4; color: #15803d; font-weight: 700; border-color: #bbf7d0; }
    .payroll-input.red { background-color: #fef2f2; color: #b91c1c; border-color: #fecaca; }

    /* --- Badges --- */
    .badge { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }

    /* --- Animations --- */
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen text-slate-900">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="min-h-screen flex items-center justify-center p-4 bg-slate-50">
    <div class="card w-full max-w-md p-10 shadow-lg fade-in">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white text-3xl mb-4 shadow-lg shadow-blue-200">
          🇦
        </div>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">DesPardes Payroll</h1>
        <p class="text-slate-500 text-sm mt-2">Professional Restaurant Management</p>
      </div>

      <div class="flex bg-slate-100 p-1 rounded-lg mb-6">
        <button id="btnTabSignIn" class="flex-1 py-2 rounded-md text-sm font-semibold bg-white text-slate-900 shadow-sm transition-all" onclick="switchAuthTab('signIn')">Sign In</button>
        <button id="btnTabSignUp" class="flex-1 py-2 rounded-md text-sm font-semibold text-slate-500 hover:text-slate-700 transition-all" onclick="switchAuthTab('signUp')">Create Account</button>
      </div>

      <form id="formSignIn" onsubmit="handleSignIn(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Email Address</label>
          <input type="email" id="inEmail" required placeholder="you@company.com" class="input-field">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Password</label>
          <input type="password" id="inPass" required placeholder="••••••••" class="input-field">
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2">Sign In</button>
      </form>

      <form id="formSignUp" class="hidden space-y-4" onsubmit="handleSignUp(event)">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Email Address</label>
          <input type="email" id="upEmail" required placeholder="you@company.com" class="input-field">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Password</label>
          <input type="password" id="upPass" required minlength="6" placeholder="Min 6 characters" class="input-field">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Confirm Password</label>
          <input type="password" id="upPass2" required minlength="6" placeholder="Confirm password" class="input-field">
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2 bg-green-600 hover:bg-green-700">Create Account</button>
      </form>

      <div id="authMsg" class="mt-6 text-sm text-center hidden"></div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="hidden min-h-screen bg-slate-50 flex">
    
    <!-- Sidebar -->
    <aside class="sidebar w-64 fixed h-full overflow-y-auto z-10 hidden md:block">
      <div class="p-6 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white text-xl shadow-md shadow-blue-200">
            🇦
          </div>
          <div>
            <h2 class="text-lg font-bold text-slate-900 leading-none">DesPardes</h2>
            <p class="text-xs text-slate-400 font-medium mt-1">PAYROLL PRO</p>
          </div>
        </div>
      </div>
      <nav class="p-4 space-y-1">
        <button onclick="showPage('dashboard')" class="sidebar-item active w-full text-left px-4 py-3 rounded-lg text-sm flex items-center gap-3" data-page="dashboard">
          <span class="text-lg">📊</span> Dashboard
        </button>
        <button onclick="showPage('employees')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm flex items-center gap-3" data-page="employees">
          <span class="text-lg">👥</span> Employees
        </button>
        <button onclick="showPage('payroll')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm flex items-center gap-3" data-page="payroll">
          <span class="text-lg">💰</span> Single Entry
        </button>
        <button onclick="showPage('bulkPayroll')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm flex items-center gap-3" data-page="bulkPayroll">
          <span class="text-lg">📝</span> Bulk Payroll
        </button>
        <button onclick="showPage('loans')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm flex items-center gap-3" data-page="loans">
          <span class="text-lg">💳</span> Loans
        </button>
        <button onclick="showPage('reports')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm flex items-center gap-3" data-page="reports">
          <span class="text-lg">📈</span> Reports
        </button>
        
        <div class="pt-8 mt-8 border-t border-slate-100">
          <button onclick="handleLogout()" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm flex items-center gap-3 text-red-500 hover:text-red-600 hover:bg-red-50">
            <span class="text-lg">🚪</span> Logout
          </button>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-0 md:ml-64 p-4 md:p-8 overflow-y-auto h-screen">
      <div id="pageContent"></div>
    </main>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="card w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl p-6 md:p-8 mx-4">
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    // --- CONFIGURATION ---
    const SB_URL = 'https://lqolicwuailbemonuaor.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxxb2xpY3d1YWlsYmVtb251YW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDEzMjIsImV4cCI6MjA5MTMxNzMyMn0.WdEHwSJXM1hTXrlM5Rebs5PnyUDmO0DYHv05D-BgIWo';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);
    const CURRENCY = 'AED';

    let employees = [];
    let payrollRecords = [];
    let loanTransactions = [];
    let reportFilters = { tab: 'payroll', month: '0', year: '0', employee: 'all' };
    let autoSaveInterval = null;

    // --- UTILS ---
    function fmt(value) { 
      return CURRENCY + ' ' + parseFloat(value||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ","); 
    }

    function showSavedIndicator() {
      var existing = document.querySelector('.saved-indicator');
      if (existing) existing.remove();
      var div = document.createElement('div');
      div.className = 'fixed top-6 right-6 bg-green-600 text-white px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2 animate-bounce';
      div.innerHTML = '<span class="text-lg">✓</span> Auto-saved';
      document.body.appendChild(div);
      setTimeout(function() { div.remove(); }, 2000);
    }

    // --- AUTH FUNCTIONS ---
    function switchAuthTab(tab) {
      var formIn = document.getElementById('formSignIn');
      var formUp = document.getElementById('formSignUp');
      var tabIn = document.getElementById('btnTabSignIn');
      var tabUp = document.getElementById('btnTabSignUp');
      if (tab === 'signIn') {
        formIn.classList.remove('hidden'); formUp.classList.add('hidden');
        tabIn.className = 'flex-1 py-2 rounded-md text-sm font-semibold bg-white text-slate-900 shadow-sm transition-all';
        tabUp.className = 'flex-1 py-2 rounded-md text-sm font-semibold text-slate-500 hover:text-slate-700 transition-all';
      } else {
        formIn.classList.add('hidden'); formUp.classList.remove('hidden');
        tabIn.className = 'flex-1 py-2 rounded-md text-sm font-semibold text-slate-500 hover:text-slate-700 transition-all';
        tabUp.className = 'flex-1 py-2 rounded-md text-sm font-semibold bg-white text-slate-900 shadow-sm transition-all';
      }
    }

    function showAuthMsg(text, ok) {
      var el = document.getElementById('authMsg');
      el.textContent = text;
      el.className = 'mt-6 text-sm text-center p-4 rounded-lg ' + (ok ? 'bg-green-50 text-green-700 border border-green-100' : 'bg-red-50 text-red-700 border border-red-100');
      el.classList.remove('hidden');
    }

    async function handleSignIn(e) {
      e.preventDefault();
      var result = await sb.auth.signInWithPassword({ email: document.getElementById('inEmail').value, password: document.getElementById('inPass').value });
      if (result.error) showAuthMsg('Invalid credentials'); else initApp();
    }

    async function handleSignUp(e) {
      e.preventDefault();
      var pass = document.getElementById('upPass').value;
      if (pass !== document.getElementById('upPass2').value) return showAuthMsg('Passwords mismatch');
      var result = await sb.auth.signUp({ email: document.getElementById('upEmail').value, password: pass });
      if (result.error) showAuthMsg(result.error.message);
      else if (result.data.session) initApp();
      else showAuthMsg('Check email to confirm', true);
    }

    async function handleLogout() { await sb.auth.signOut(); location.reload(); }

    function initApp() {
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      document.getElementById('appScreen').classList.add('flex');
      loadData();
    }

    async function loadData() {
      var empRes = await sb.from('employees').select('*').order('name');
      var payRes = await sb.from('payroll_records').select('*').order('year').order('month', {ascending: false});
      var loanRes = await sb.from('loan_transactions').select('*').order('created_at', {ascending: false});
      employees = empRes.data || [];
      payrollRecords = payRes.data || [];
      loanTransactions = loanRes.data || [];
      showPage('dashboard');
    }

    function showPage(page) {
      document.querySelectorAll('.sidebar-item').forEach(function(b) { b.classList.toggle('active', b.dataset.page === page); });
      var content = document.getElementById('pageContent');
      if (page === 'dashboard') renderDashboard(content);
      else if (page === 'employees') renderEmployees(content);
      else if (page === 'payroll') renderPayroll(content);
      else if (page === 'bulkPayroll') renderBulkPayroll(content);
      else if (page === 'loans') renderLoans(content);
      else if (page === 'reports') renderReports(content);
    }

    // --- DASHBOARD ---
    function renderDashboard(container) {
      var totalPaid = 0, totalLoans = 0, activeEmployees = 0;
      payrollRecords.forEach(function(r) { totalPaid += parseFloat(r.net_payable||0); });
      employees.forEach(function(e) { totalLoans += parseFloat(e.loan_balance||0); if(e.status==='active') activeEmployees++; });

      container.innerHTML = 
        '<div class="hero-section fade-in">' +
          '<div class="relative z-10">' +
            '<h1 class="text-2xl font-light text-slate-300 mb-1">Total Paid</h1>' +
            '<div class="text-4xl md:text-5xl font-bold tracking-tight mb-8">' + fmt(totalPaid) + '</div>' +
            '<div class="grid grid-cols-2 md:grid-cols-4 gap-8">' +
              '<div><p class="text-slate-400 text-xs uppercase tracking-wider mb-1">Active Employees</p><p class="text-2xl font-semibold">' + activeEmployees + '</p></div>' +
              '<div><p class="text-slate-400 text-xs uppercase tracking-wider mb-1">Outstanding Loans</p><p class="text-2xl font-semibold">' + fmt(totalLoans) + '</p></div>' +
              '<div><p class="text-slate-400 text-xs uppercase tracking-wider mb-1">Payroll Records</p><p class="text-2xl font-semibold">' + payrollRecords.length + '</p></div>' +
              '<div><p class="text-slate-400 text-xs uppercase tracking-wider mb-1">Net Profit Est.</p><p class="text-2xl font-semibold text-emerald-400">--</p></div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        '<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 fade-in">' +
          '<div class="card p-6">' +
            '<h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-4">Quick Actions</h3>' +
            '<div class="space-y-3">' +
              '<button onclick="showPage(\'bulkPayroll\')" class="w-full text-left bg-slate-50 hover:bg-slate-100 p-4 rounded-xl transition flex items-center justify-between group">' +
                '<span class="font-medium text-slate-700">📝 Start Bulk Payroll</span><span class="text-slate-400 group-hover:text-blue-600">→</span>' +
              '</button>' +
              '<button onclick="showPage(\'payroll\')" class="w-full text-left bg-slate-50 hover:bg-slate-100 p-4 rounded-xl transition flex items-center justify-between group">' +
                '<span class="font-medium text-slate-700">💰 Single Entry</span><span class="text-slate-400 group-hover:text-blue-600">→</span>' +
              '</button>' +
              '<button onclick="showPage(\'employees\')" class="w-full text-left bg-slate-50 hover:bg-slate-100 p-4 rounded-xl transition flex items-center justify-between group">' +
                '<span class="font-medium text-slate-700">👥 Manage Staff</span><span class="text-slate-400 group-hover:text-blue-600">→</span>' +
              '</button>' +
            '</div>' +
          '</div>' +
          '<div class="card p-6 md:col-span-2">' +
            '<h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-4">Recent Activity</h3>' +
            '<div class="space-y-4">' + 
              (payrollRecords.slice(0, 4).map(function(r) {
                var emp = employees.find(function(e){return e.id===r.employee_id;});
                return '<div class="flex items-center justify-between p-3 hover:bg-slate-50 rounded-lg transition">' +
                  '<div class="flex items-center gap-3">' +
                    '<div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">' + (emp?emp.name.charAt(0):'?') + '</div>' +
                    '<div><p class="font-medium text-slate-900">' + (emp?emp.name:'Unknown') + '</p><p class="text-xs text-slate-500">Payroll ' + r.month + '/' + r.year + '</p></div>' +
                  '</div>' +
                  '<span class="font-bold text-slate-900">' + fmt(r.net_payable) + '</span>' +
                '</div>';
              }).join('') || '<p class="text-slate-400 text-sm text-center py-4">No activity yet</p>') +
            '</div>' +
          '</div>' +
        '</div>';
    }

    // --- EMPLOYEES ---
    function renderEmployees(container) {
      var html = '<div class="flex justify-between items-center mb-6">' +
        '<div><h1 class="text-2xl font-bold text-slate-900">Employees</h1><p class="text-slate-500 text-sm">Manage your team members</p></div>' +
        '<div class="flex gap-3">' +
          '<button onclick="showImportExcelModal()" class="btn-secondary">📥 Import Excel</button>' +
          '<button onclick="showAddEmployeeModal()" class="btn-primary">➕ Add Employee</button>' +
        '</div>' +
      '</div>' +
      
      '<div id="bulkDeleteBar" class="hidden bg-red-50 border border-red-100 p-4 rounded-xl mb-6 flex justify-between items-center">' +
        '<span class="text-red-800 font-semibold flex items-center gap-2">🗑️ <span id="selectedCount">0</span> selected</span>' +
        '<div class="flex gap-3"><button onclick="deselectAllEmployees()" class="text-sm text-red-600 hover:underline">Cancel</button><button onclick="deleteSelectedEmployees()" class="btn-danger py-1.5 px-4 text-sm">Delete Selected</button></div>' +
      '</div>' +
      
      '<div class="card table-container fade-in">' +
        '<table>' +
          '<thead><tr>' +
            '<th class="w-10"><input type="checkbox" id="selectAllEmp" onchange="toggleSelectAllEmployees(this)"></th>' +
            '<th>Employee</th>' +
            '<th>Position</th>' +
            '<th>Salary</th>' +
            '<th>Loan Balance</th>' +
            '<th>Actions</th>' +
          '</tr></thead>' +
          '<tbody id="empTableBody"></tbody>' +
        '</table>' +
      '</div>';
      
      container.innerHTML = html;
      renderEmployeeRows();
    }

    function renderEmployeeRows() {
      var tbody = document.getElementById('empTableBody');
      if (!tbody) return;
      var html = '';
      employees.forEach(function(emp) {
        html += '<tr class="border-b border-slate-100 hover:bg-slate-50">' +
          '<td><input type="checkbox" class="empCheckbox w-4 h-4 text-blue-600 rounded border-slate-300" value="' + emp.id + '" onchange="updateBulkDeleteBar()"></td>' +
          '<td class="font-medium text-slate-900">' + emp.name + '</td>' +
          '<td class="text-slate-500">' + (emp.role || '-') + '</td>' +
          '<td class="font-medium">' + fmt(emp.base_salary) + '</td>' +
          '<td><span class="badge ' + (emp.loan_balance > 0 ? 'badge-danger' : 'badge-success') + '">' + fmt(emp.loan_balance||0) + '</span></td>' +
          '<td><button onclick="viewEmployeeHistory(\'' + emp.id + '\')" class="text-blue-600 hover:text-blue-800 text-sm font-medium mr-3">History</button><button onclick="deleteEmployee(\'' + emp.id + '\')" class="text-red-500 hover:text-red-700 text-sm font-medium">Delete</button></td>' +
        '</tr>';
      });
      tbody.innerHTML = html || '<tr><td colspan="6" class="text-center py-8 text-slate-400">No employees found</td></tr>';
    }

    function populatePositionFilter() {
      var positions = employees.map(function(e){return e.role;}).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();

      positions.forEach(function(pos){ select.add(new Option(pos, pos.toLowerCase())); });

    function filterBulkPayroll() {
      var search = document.getElementById('bpSearch').value.toLowerCase();
      var posFilter = document.getElementById('bpFilterPos').value;
      document.querySelectorAll('.bp-row').forEach(function(row) {
        var match = row.getAttribute('data-name').includes(search) && (!posFilter || row.getAttribute('data-pos') === posFilter);
        row.style.display = match ? '' : 'none';
      });
    }

    function copyFromPreviousMonth() {
      var month = parseInt(document.getElementById('bpMonth').value);
      var year = parseInt(document.getElementById('bpYear').value);
      var prevMonth = month === 1 ? 12 : month - 1;
      var prevYear = month === 1 ? year - 1 : year;
      var count = 0;
      
      document.querySelectorAll('.bp-row').forEach(function(row) {
        var prev = payrollRecords.find(function(r) { return r.employee_id === row.getAttribute('data-emp-id') && r.month === prevMonth && r.year === prevYear; });
        if (prev) {
          row.querySelector('.bp-days').value = prev.days_worked || 30;
          row.querySelector('.bp-bonus').value = prev.bonuses || 0;
          row.querySelector('.bp-leave').value = prev.leave_pay || 0;
          row.querySelector('.bp-gratuity').value = prev.gratuity || 0;
          row.querySelector('.bp-penalty').value = prev.penalties || 0;
          row.querySelector('.bp-advance').value = prev.advance_salary || 0;
          row.querySelector('.bp-loan-rep').value = prev.loans_repaid || 0;
          count++; calcRow(row.querySelector('.bp-days'));
        }
      });
      alert('Copied data for ' + count + ' employees');
    }

    function refreshBulkPayroll() {
      var days = parseInt(document.getElementById('bpTotalDays').value) || 28;
      document.querySelectorAll('.bp-days').forEach(function(i){i.value=days;});
      calcAllRows();
    }

    function applyToAll(field) {
      var val = prompt('Value to apply:');
      if(val === null) return;
      var count = 0;
      document.querySelectorAll('.bp-row').forEach(function(row){
        if(row.style.display !== 'none') {
          var input = row.querySelector('.bp-'+field);
          if(input) { input.value = parseFloat(val)||0; calcRow(input); count++; }
        }
      });
      alert('Applied to '+count+' employees');
    }

    function markAllPaid() {
      document.querySelectorAll('.bp-status').forEach(function(s){s.value='paid';});
      updatePaymentSummary();
    }

    function calcRow(input) {
      var row = input.closest('tr');
      var sal = parseFloat(row.querySelector('td[data-contracted]').dataset.contracted)||0;
      var days = parseFloat(row.querySelector('.bp-days').value)||0;
      var totalDays = parseInt(document.getElementById('bpTotalDays').value)||28;
      var actual = (sal * days) / totalDays;
      
      row.querySelector('.bp-actual').textContent = actual.toFixed(2);
      row.querySelector('.bp-actual').dataset.value = actual;

      var add = ['bp-bonus','bp-leave','bp-gratuity'].reduce(function(s,c){return s+(parseFloat(row.querySelector('.'+c).value)||0);},0);
      var sub = ['bp-penalty','bp-advance','bp-loan-rep','bp-other'].reduce(function(s,c){return s+(parseFloat(row.querySelector('.'+c).value)||0);},0);
      
      row.querySelector('.bp-net').textContent = (actual + add - sub).toFixed(2);
      updateTotalNet(); updatePaymentSummary(); triggerAutoSave();
    }

    function calcAllRows() { document.querySelectorAll('.bp-days').forEach(function(i){if(i) calcRow(i);}); }

    function updateTotalNet() {
      var total = 0;
      document.querySelectorAll('.bp-row').forEach(function(row){ if(row.style.display!=='none') total += parseFloat(row.querySelector('.bp-net').textContent)||0; });
      document.getElementById('totalNetPayable').textContent = fmt(total);
    }

    function updatePaymentSummary() {
      var rows = document.querySelectorAll('.bp-row');
      var paid = 0, total = 0;
      rows.forEach(function(row){ if(row.style.display!=='none'){total++; if(row.querySelector('.bp-status').value==='paid') paid++;}});
      document.getElementById('paymentSummary').textContent = paid + '/' + total + ' Paid';
    }

    function getBulkPayrollData() {
      var d = [];
      document.querySelectorAll('.bp-row').forEach(function(row){
        d.push({id:row.dataset.empId, d:row.querySelector('.bp-days').value, b:row.querySelector('.bp-bonus').value, l:row.querySelector('.bp-leave').value, g:row.querySelector('.bp-gratuity').value, p:row.querySelector('.bp-penalty').value, a:row.querySelector('.bp-advance').value, lr:row.querySelector('.bp-loan-rep').value, lg:row.querySelector('.bp-loan-giv').value, o:row.querySelector('.bp-other').value, s:row.querySelector('.bp-status').value});

    function exportBulkPayrollTemplate() {
      var csv = 'Employee,Days,Bonus,Leave,Gratuity,Penalty,Advance,Loan Ret,Loan Giv,Other,Status\n';
      document.querySelectorAll('.bp-row').forEach(function(row){ csv += row.querySelector('td:nth-child(2)').textContent + ',30,0,0,0,0,0,0,0,0,pending\n'; });
      downloadCSV(csv, 'payroll-template.csv');

    function importBulkPayrollData(input) {
      if(!input.files[0]) return;
      Papa.parse(input.files[0], {header:true, complete:function(res){
        var count = 0;
        res.data.forEach(function(row){
          if(!row['Employee']) return;
          document.querySelectorAll('.bp-row').forEach(function(tr){
            if(tr.querySelector('td:nth-child(2)').textContent === row['Employee']) {
              if(row['Days']) tr.querySelector('.bp-days').value = row['Days'];
              if(row['Bonus']) tr.querySelector('.bp-bonus').value = row['Bonus'];
              if(row['Loan Giv']) tr.querySelector('.bp-loan-giv').value = row['Loan Giv'];
              // Add other fields similarly...
              calcRow(tr.querySelector('.bp-days'));
              count++;
            }
          });
        });
        alert('Imported data for '+count+' employees');
      }});
    }

    async function saveBulkPayroll() {
      if(!confirm('Save records?')) return;
      var btn = event.target;
      btn.textContent = 'Saving...'; btn.disabled = true;
      
      var m = parseInt(document.getElementById('bpMonth').value);
      var y = parseInt(document.getElementById('bpYear').value);
      var days = parseInt(document.getElementById('bpTotalDays').value)||28;
      var promises = [];

      document.querySelectorAll('.bp-row').forEach(function(row){
        if(row.style.display==='none') return;
        var eid = row.dataset.empId;
        var emp = employees.find(function(e){return e.id===eid;});
        if(!emp) return;

        var bns = parseFloat(row.querySelector('.bp-bonus').value)||0;
        var lv = parseFloat(row.querySelector('.bp-leave').value)||0;
        var gr = parseFloat(row.querySelector('.bp-gratuity').value)||0;
        var pn = parseFloat(row.querySelector('.bp-penalty').value)||0;
        var adv = parseFloat(row.querySelector('.bp-advance').value)||0;
        var lr = parseFloat(row.querySelector('.bp-loan-rep').value)||0;
        var lg = parseFloat(row.querySelector('.bp-loan-giv').value)||0;
        var od = parseFloat(row.querySelector('.bp-other').value)||0;
        var dw = parseFloat(row.querySelector('.bp-days').value)||0;
        var status = row.querySelector('.bp-status').value;

        var actual = (emp.base_salary * dw)/days;
        var net = actual + bns + lv + gr - pn - adv - lr - od;

        promises.push(sb.from('payroll_records').upsert({
          employee_id:eid, month:m, year:y, total_days:days, days_worked:dw,
          base_salary:emp.base_salary, actual_salary:actual, net_payable:net,
          bonuses:bns, leave_pay:lv, gratuity:gr, penalties:pn, advance_salary:adv,
          loans_repaid:lr, other_deductions:od, payment_status:status
        }, {onConflict:'employee_id,month,year'}));

        if(lg>0 || lr>0) {
          var cur = emp.loan_balance||0;
          var newB = cur + lg - lr;
          if(lg>0) promises.push(sb.from('loan_transactions').insert({employee_id:eid, type:'advanced', amount:lg, description:'Bulk', balance_after:newB}));
          if(lr>0) promises.push(sb.from('loan_transactions').insert({employee_id:eid, type:'repaid', amount:lr, description:'Bulk', balance_after:newB}));
          promises.push(sb.from('employees').update({loan_balance:newB}).eq('id',eid));
        }
      });

      try { await Promise.all(promises); alert('Saved successfully!'); localStorage.removeItem('bulkDraft'); if(autoSaveInterval) clearInterval(autoSaveInterval); loadData(); }
      catch(e) { alert('Error: ' + e.message); }
      finally { btn.textContent = '💾 Save All Records'; btn.disabled = false; }
    }

              '<div class="mb-6"><label class="block text-xs font-semibold text-slate-500 uppercase mb-1">New Loan Given (Optional)</label><input name="loansAdvanced" type="number" step="0.01" value="0" class="input-field"></div>' +

              '<div class="bg-emerald-50 border border-emerald-200 rounded-xl p-6 mb-8 text-center">' +
                '<p class="text-sm font-semibold text-emerald-800 uppercase tracking-wide mb-1">Net Payable</p>' +
                '<p class="text-4xl font-bold text-emerald-700" id="netPayableDisplay">0.00</p>' +
              '</div>' +

              '<div class="flex gap-4">' +
                '<button type="submit" class="btn-primary flex-1 py-3 text-lg">Save Payroll</button>' +
                '<button type="button" onclick="showPage(\'dashboard\')" class="btn-secondary flex-1 py-3 text-lg">Cancel</button>' +
              '</div>' +
            '</form>' +
          '</div>' +
        '</div>';
    }

    function updateSalaryCalc() {
      var sel = document.getElementById('employeeSelect');
      document.getElementById('contractedSalary').value = sel.options[sel.selectedIndex].dataset.salary||0;
      calcActualSalary();
    }

    function autoUpdateDays() {
      var m = parseInt(document.getElementById('payMonth').value);
      var y = parseInt(document.getElementById('payYear').value);
      var d = new Date(y, m, 0).getDate();
      document.getElementById('totalDays').value = d;
      document.getElementById('daysWorked').value = d;
      calcActualSalary();
    }

    function calcActualSalary() {
      var sal = parseFloat(document.getElementById('contractedSalary').value)||0;
      var dw = parseInt(document.getElementById('daysWorked').value)||0;
      var td = parseInt(document.getElementById('totalDays').value)||1;
      document.getElementById('actualSalary').value = ((sal*dw)/td).toFixed(2);
      calcNetPayable();
    }

    function calcNetPayable() {
      var act = parseFloat(document.getElementById('actualSalary').value)||0;
      var add=0, sub=0;
      document.querySelectorAll('.calc-field').forEach(function(f){
        var v=parseFloat(f.value)||0;
        if(['bonuses','leavePay','gratuity','otherEarnings'].includes(f.name)) add+=v; else sub+=v;
      });
      document.getElementById('netPayableDisplay').textContent = (act+add-sub).toFixed(2);
    }

    async function submitPayroll(e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      var eid = fd.get('employeeId')||document.getElementById('employeeSelect').value;
      var emp = employees.find(function(x){return x.id===eid;});
      
      var m=parseInt(fd.get('month')), y=parseInt(fd.get('year'));
      var td=parseInt(fd.get('totalDays')), dw=parseInt(fd.get('daysWorked'));
      var lg = parseFloat(fd.get('loansAdvanced'))||0;
      
      var act = (emp.base_salary*dw)/td;
      var net = act + parseFloat(fd.get('bonuses')) + parseFloat(fd.get('leavePay')) + parseFloat(fd.get('gratuity')) + parseFloat(fd.get('otherEarnings')) - parseFloat(fd.get('penalties')) - parseFloat(fd.get('loansRepaid')) - parseFloat(fd.get('advanceSalary')) - parseFloat(fd.get('otherDeductions'));

      await sb.from('payroll_records').upsert({
        employee_id:eid, month:m, year:y, total_days:td, days_worked:dw, base_salary:emp.base_salary, actual_salary:act, net_payable:net,
        bonuses:parseFloat(fd.get('bonuses')), leave_pay:parseFloat(fd.get('leavePay')), gratuity:parseFloat(fd.get('gratuity')), other_earnings:parseFloat(fd.get('otherEarnings')),
        penalties:parseFloat(fd.get('penalties')), loans_repaid:parseFloat(fd.get('loansRepaid')), advance_salary:parseFloat(fd.get('advanceSalary')), other_deductions:parseFloat(fd.get('otherDeductions'))
      }, {onConflict:'employee_id,month,year'});

      if(lg>0 || parseFloat(fd.get('loansRepaid'))>0) {
        var cb=emp.loan_balance||0, nb=cb+lg-parseFloat(fd.get('loansRepaid'));
        if(lg>0) await sb.from('loan_transactions').insert({employee_id:eid, type:'advanced', amount:lg, description:'Manual', balance_after:nb});
        if(parseFloat(fd.get('loansRepaid'))>0) await sb.from('loan_transactions').insert({employee_id:eid, type:'repaid', amount:parseFloat(fd.get('loansRepaid')), description:'Manual', balance_after:nb});
        await sb.from('employees').update({loan_balance:nb}).eq('id',eid);
      }
      alert('Saved! Net: '+fmt(net)); loadData();
    }

    // --- LOANS ---
    function renderLoans(container) {
      var totalOut=0, withLoans=0;
      employees.forEach(function(e){ totalOut+=parseFloat(e.loan_balance||0); if(e.loan_balance>0) withLoans++; });
      
      container.innerHTML = 
        '<div class="hero-section fade-in mb-6">' +
          '<h1 class="text-2xl font-light text-slate-300 mb-1">Total Outstanding Loans</h1>' +
          '<div class="text-4xl md:text-5xl font-bold tracking-tight">' + fmt(totalOut) + '</div>' +
        '</div>' +
        '<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 fade-in">' +
          '<div class="card p-6 text-center"><p class="text-slate-500 text-sm uppercase">Employees with Loans</p><p class="text-3xl font-bold text-blue-600 mt-2">'+withLoans+'</p></div>' +
          '<div class="card p-6 text-center"><p class="text-slate-500 text-sm uppercase">Total Transactions</p><p class="text-3xl font-bold text-purple-600 mt-2">'+loanTransactions.length+'</p></div>' +
        '</div>' +
        '<div class="card table-container fade-in"><table><thead><tr><th>Employee</th><th>Balance</th><th>Advanced</th><th>Repaid</th><th>Action</th></tr></thead><tbody>';
        
      employees.forEach(function(emp) {
        var lo = loanTransactions.filter(function(r){return r.employee_id===emp.id;});
        var adv=0, rep=0;
        lo.forEach(function(r){if(r.type==='advanced')adv+=r.amount;else rep+=r.amount;});
        container.innerHTML += '<tr><td class="font-medium">'+emp.name+'</td><td><span class="badge '+(emp.loan_balance>0?'badge-danger':'badge-success')+'">'+fmt(emp.loan_balance||0)+'</span></td><td class="text-red-600">'+fmt(adv)+'</td><td class="text-green-600">'+fmt(rep)+'</td><td><button onclick="viewEmployeeHistory(\''+emp.id+'\')" class="text-blue-600 hover:underline text-sm">History</button></td></tr>';
      });
      
      container.innerHTML += '</tbody></table></div>';
    }

    // --- REPORTS ---
    function renderReports(container) {
      container.innerHTML = 
        '<div class="mb-6"><h1 class="text-2xl font-bold text-slate-900">Reports</h1><p class="text-slate-500 text-sm">View and export payroll data</p></div>' +
        '<div class="flex gap-2 mb-6 fade-in">' +
          '<button onclick="switchReportTab(\'payroll\')" id="tab-payroll" class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white">Payroll</button>' +
          '<button onclick="switchReportTab(\'loans\')" id="tab-loans" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-slate-600 border border-slate-200">Loans</button>' +
          '<button onclick="switchReportTab(\'history\')" id="tab-history" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-slate-600 border border-slate-200">History</button>' +
        '</div>' +
        '<div class="card p-6 fade-in">' +
          '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">' +
            '<div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Month</label><select id="filterMonth" onchange="updateReportFilters()" class="input-field"><option value="0">All</option>'+Array.from({length:12},(_,i)=>'<option value="'+(i+1)+'">'+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][i]+'</option>').join('')+'</select></div>' +
            '<div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Year</label><select id="filterYear" onchange="updateReportFilters()" class="input-field"><option value="All Years">All</option></select></div>' +
            '<div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Employee</label><select id="filterEmployee" onchange="updateReportFilters()" class="input-field"><option value="all">All</option>'+employees.map(function(e){return '<option value="'+e.id+'">'+e.name+'</option>';}).join('')+'</select></div>' +
          '</div>' +
          '<div id="reportSummary" class="mb-6"></div>' +
          '<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-slate-900" id="reportTitle">Records</h3><button onclick="exportCurrentReport()" class="btn-secondary text-sm">📥 Export CSV</button></div>' +
          '<div class="overflow-x-auto max-h-[500px] table-container"><table class="w-full text-sm" id="reportTable"><thead class="bg-slate-50 sticky top-0" id="reportTableHead"></thead><tbody id="reportTableBody"></tbody></table></div>' +
        '</div>';
      
      var years = ['All Years'].concat(payrollRecords.map(function(r){return r.year;}).filter(function(v,i,a){return a.indexOf(v)===i;}));
      document.getElementById('filterYear').innerHTML = years.map(function(y){return '<option value="'+y+'">'+y+'</option>';}).join('');
      updateReportFilters();
    }

    function switchReportTab(tab) {
      reportFilters.tab = tab;
      document.querySelectorAll('.tab-btn').forEach(function(b){b.className='tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-slate-600 border border-slate-200';});
      var btn = document.getElementById('tab-'+tab);
      btn.className = 'tab-btn active px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white border border-transparent';
      updateReportView();
    }

    function updateReportFilters() {
      reportFilters.month = document.getElementById('filterMonth').value;
      reportFilters.year = document.getElementById('filterYear').value;
      reportFilters.employee = document.getElementById('filterEmployee').value;
      updateReportView();
    }

    function updateReportView() {
      var data = payrollRecords.filter(function(r){
        if(reportFilters.month!=='0' && r.month!==parseInt(reportFilters.month)) return false;
        if(reportFilters.year!=='All Years' && r.year!==parseInt(reportFilters.year)) return false;
        if(reportFilters.employee!=='all' && r.employee_id!==reportFilters.employee) return false;
        return true;
      });

      var head = document.getElementById('reportTableHead');
      var body = document.getElementById('reportTableBody');
      var summ = document.getElementById('reportSummary');

      if(reportFilters.tab==='payroll') {
        document.getElementById('reportTitle').textContent = 'Payroll Records';
        head.innerHTML = '<tr><th>Employee</th><th>Period</th><th>Actual</th><th>Additions</th><th>Deductions</th><th>Net</th></tr>';
        var total = 0;
        body.innerHTML = data.map(function(r){
          var emp = employees.find(function(e){return e.id===r.employee_id;});
          var add = (parseFloat(r.bonuses)||0)+(parseFloat(r.leave_pay)||0)+(parseFloat(r.gratuity)||0)+(parseFloat(r.other_earnings)||0);
          var sub = (parseFloat(r.penalties)||0)+(parseFloat(r.loans_repaid)||0)+(parseFloat(r.advance_salary)||0)+(parseFloat(r.other_deductions)||0);
          total += parseFloat(r.net_payable||0);
          return '<tr><td class="font-medium">'+(emp?emp.name:'?')+'</td><td>'+r.month+'/'+r.year+'</td><td>'+fmt(r.actual_salary||r.base_salary)+'</td><td class="text-green-600">+'+fmt(add)+'</td><td class="text-red-600">-'+fmt(sub)+'</td><td class="font-bold">'+fmt(r.net_payable)+'</td></tr>';
        }).join('');
        summ.innerHTML = '<div class="bg-blue-50 p-4 rounded-xl text-center"><p class="text-blue-800 font-bold text-xl">'+fmt(total)+'</p><p class="text-blue-600 text-sm">Total Net Payable</p></div>';
      }
      else if(reportFilters.tab==='loans') {
        document.getElementById('reportTitle').textContent = 'Loan Summary';
        head.innerHTML = '<tr><th>Employee</th><th>Balance</th><th>Advanced</th><th>Repaid</th></tr>';
        var total = 0;
        body.innerHTML = employees.map(function(emp){
          var lo = loanTransactions.filter(function(r){return r.employee_id===emp.id;});
          var a=0, p=0; lo.forEach(function(r){if(r.type==='advanced')a+=r.amount;else p+=r.amount;});
          total += parseFloat(emp.loan_balance||0);
          return '<tr><td class="font-medium">'+emp.name+'</td><td class="font-bold">'+fmt(emp.loan_balance||0)+'</td><td class="text-red-600">'+fmt(a)+'</td><td class="text-green-600">'+fmt(p)+'</td></tr>';
        }).join('');
        summ.innerHTML = '<div class="bg-orange-50 p-4 rounded-xl text-center"><p class="text-orange-800 font-bold text-xl">'+fmt(total)+'</p><p class="text-orange-600 text-sm">Total Outstanding</p></div>';
      }
      else {
        document.getElementById('reportTitle').textContent = 'Full History';
        head.innerHTML = '<tr><th>Employee</th><th>Period</th><th>Net</th></tr>';
        body.innerHTML = data.map(function(r){
          var emp = employees.find(function(e){return e.id===r.employee_id;});
          return '<tr><td class="font-medium">'+(emp?emp.name:'?')+'</td><td>'+r.month+'/'+r.year+'</td><td class="font-bold">'+fmt(r.net_payable)+'</td></tr>';
        }).join('');
        summ.innerHTML = '<div class="bg-slate-100 p-4 rounded-xl text-center"><p class="text-slate-800 font-bold text-xl">'+data.length+'</p><p class="text-slate-600 text-sm">Records</p></div>';
      }
    }

    function exportCurrentReport() {
      if(reportFilters.tab==='payroll') {
        var c = 'Employee,Period,Actual,Add,Deduct,Net\n';
        payrollRecords.forEach(function(r){var e=employees.find(function(x){return x.id===r.employee_id;});var a=(parseFloat(r.bonuses)||0)+(parseFloat(r.leave_pay)||0)+(parseFloat(r.gratuity)||0);var s=(parseFloat(r.penalties)||0)+(parseFloat(r.loans_repaid)||0)+(parseFloat(r.advance_salary)||0);c+=(e?e.name:'?')+','+r.month+'/'+r.year+','+(r.actual_salary||r.base_salary)+','+a+','+s+','+r.net_payable+'\n';});
        downloadCSV(c, 'payroll-report.csv');
      } else if(reportFilters.tab==='loans') {
        var c = 'Employee,Balance,Adv,Rep\n';
        employees.forEach(function(e){var lo=loanTransactions.filter(function(r){return r.employee_id===e.id;});var a=0,p=0;lo.forEach(function(r){if(r.type==='advanced')a+=r.amount;else p+=r.amount;});c+=e.name+','+(e.loan_balance||0)+','+a+','+p+'\n';});
        downloadCSV(c, 'loan-report.csv');
      }
    }

    function downloadCSV(csv, fn) { var b=new Blob([csv],{type:'text/csv'}); var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download=fn; a.click(); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    
    // Modals
    function showImportExcelModal() {
      document.getElementById('modalContent').innerHTML = '<div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold text-slate-900">Import Excel</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button></div><div class="mb-6"><p class="text-slate-600 mb-4">Columns: Description, Position, Contracted Salary</p><input type="file" id="excelFile" accept=".xlsx,.xls,.csv" class="input-field mb-4"></div><div class="flex gap-3"><button onclick="processExcelImport()" class="btn-primary flex-1">Import</button><button onclick="closeModal()" class="btn-secondary flex-1">Cancel</button></div>';
      document.getElementById('modal').classList.remove('hidden');
    }
    function processExcelImport() {
      var file = document.getElementById('excelFile').files[0];
      if(!file) return alert('Select a file');
      var reader = new FileReader();
      reader.onload = function(e) {
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, {type:'array'});
        var json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        var count=0, promises=[];
        json.forEach(function(row) {
          var n = row['Description']||row['Name'];
          var p = row['Position']||'';
          var s = row['Contracted Salary']||row['Salary']||0;
          if(n && s) { promises.push(sb.from('employees').insert({name:n, role:p, base_salary:parseFloat(s), loan_balance:0, status:'active'})); count++; }
        });
        Promise.all(promises).then(function(){alert('Imported '+count+' employees'); closeModal(); loadData();});
      };
      reader.readAsArrayBuffer(file);
    }

    function showAddEmployeeModal() {
      document.getElementById('modalContent').innerHTML = '<div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold text-slate-900">Add Employee</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button></div><form onsubmit="addEmployee(event)"><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"><div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Name</label><input name="name" required class="input-field"></div><div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Position</label><input name="role" class="input-field"></div><div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Salary</label><input name="baseSalary" type="number" step="0.01" required class="input-field"></div></div><div class="flex gap-3"><button type="submit" class="btn-primary flex-1">Save</button><button type="button" onclick="closeModal()" class="btn-secondary flex-1">Cancel</button></div></form>';
      document.getElementById('modal').classList.remove('hidden');
    }
    async function addEmployee(e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      await sb.from('employees').insert({name:fd.get('name'), role:fd.get('role'), base_salary:parseFloat(fd.get('baseSalary')), loan_balance:0, status:'active'});
      closeModal(); loadData();
    }
    async function deleteEmployee(id) {
      if(!confirm('Delete employee?')) return;
      await sb.from('employees').delete().eq('id', id);
      loadData();
    }
    function viewEmployeeHistory(id) {
      var emp = employees.find(function(e){return e.id===id;});
      var pr = payrollRecords.filter(function(r){return r.employee_id===id;});
      var lt = loanTransactions.filter(function(r){return r.employee_id===id;});
      var h = '<div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold text-slate-900">History: '+emp.name+'</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button></div><h3 class="font-semibold text-slate-500 mb-2">Payroll</h3><table class="w-full text-sm mb-6"><thead class="bg-slate-50"><tr><th class="text-left p-2">Month</th><th class="text-left p-2">Net</th></tr></thead><tbody>'+pr.map(function(r){return '<tr class="border-b"><td class="p-2">'+r.month+'/'+r.year+'</td><td class="p-2 font-bold">'+fmt(r.net_payable)+'</td></tr>';}).join('')+'</tbody></table><h3 class="font-semibold text-slate-500 mb-2">Loans</h3><table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="text-left p-2">Date</th><th class="text-left p-2">Type</th><th class="text-left p-2">Amount</th></tr></thead><tbody>'+lt.map(function(r){return '<tr class="border-b"><td class="p-2">'+new Date(r.created_at).toLocaleDateString()+'</td><td class="p-2">'+r.type+'</td><td class="p-2">'+fmt(r.amount)+'</td></tr>';}).join('')+'</tbody></table>';
      document.getElementById('modalContent').innerHTML = h;
      document.getElementById('modal').classList.remove('hidden');
    }

    (function() { sb.auth.getSession().then(function(r){ if(r.data && r.data.session) initApp(); }); })();
  </script>
