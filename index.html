<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesPardes Payroll Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-gray-50">

  <div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
      <h1 class="text-2xl font-bold text-center mb-2">🍽️ DesPardes Payroll Pro</h1>
      <p class="text-gray-500 text-center mb-6 text-sm">Professional Restaurant Payroll Management</p>
      
      <div class="flex bg-gray-100 rounded-lg p-1 mb-6">
        <button id="btnTabSignIn" class="flex-1 py-2 rounded-md text-sm font-semibold bg-blue-600 text-white" onclick="switchAuthTab('signIn')">Sign In</button>
        <button id="btnTabSignUp" class="flex-1 py-2 rounded-md text-sm font-semibold text-gray-600" onclick="switchAuthTab('signUp')">Create Account</button>
      </div>

      <form id="formSignIn" onsubmit="handleSignIn(event)">
        <input type="email" id="inEmail" required placeholder="Email" class="w-full px-4 py-2 border rounded-lg mb-3">
        <input type="password" id="inPass" required placeholder="Password" class="w-full px-4 py-2 border rounded-lg mb-4">
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Sign In</button>
      </form>

      <form id="formSignUp" class="hidden" onsubmit="handleSignUp(event)">
        <input type="email" id="upEmail" required placeholder="Email" class="w-full px-4 py-2 border rounded-lg mb-3">
        <input type="password" id="upPass" required minlength="6" placeholder="Password (min 6)" class="w-full px-4 py-2 border rounded-lg mb-3">
        <input type="password" id="upPass2" required minlength="6" placeholder="Confirm Password" class="w-full px-4 py-2 border rounded-lg mb-4">
        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold">Create Account</button>
      </form>

      <div id="authMsg" class="mt-4 text-sm text-center hidden"></div>
    </div>
  </div>

  <div id="appScreen" class="hidden">
    <div class="flex min-h-screen">
      <aside class="w-64 bg-white border-r border-gray-200 fixed h-full overflow-y-auto">
        <div class="p-6 border-b border-gray-200">
          <h2 class="text-xl font-bold">🍽️ DesPardes</h2>
          <p class="text-xs text-gray-500 mt-1">Payroll Pro</p>
        </div>
        <nav class="p-4 space-y-1">
          <button onclick="showPage('dashboard')" class="sidebar-item active w-full text-left px-4 py-3 rounded-lg text-sm font-medium" data-page="dashboard">📊 Dashboard</button>
          <button onclick="showPage('employees')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium" data-page="employees">👥 Employees</button>
          <button onclick="showPage('payroll')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium" data-page="payroll">💰 Payroll Entry</button>
          <button onclick="showPage('loans')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium" data-page="loans">💳 Loan Management</button>
          <button onclick="showPage('reports')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium" data-page="reports">📈 Reports</button>
          <button onclick="handleLogout()" class="sidebar-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium text-red-600 mt-8">🚪 Logout</button>
        </nav>
      </aside>

      <main class="flex-1 ml-64 p-8">
        <div id="pageContent"></div>
      </main>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const SB_URL = 'https://lqolicwuailbemonuaor.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxxb2xpY3d1YWlsYmVtb251YW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDEzMjIsImV4cCI6MjA5MTMxNzMyMn0.WdEHwSJXM1hTXrlM5Rebs5PnyUDmO0DYHv05D-BgIWo';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    let employees = [];
    let payrollRecords = [];
    let loanTransactions = [];

    function switchAuthTab(tab) {
      var formIn = document.getElementById('formSignIn');
      var formUp = document.getElementById('formSignUp');
      var tabIn = document.getElementById('btnTabSignIn');
      var tabUp = document.getElementById('btnTabSignUp');
      
      if (tab === 'signIn') {
        formIn.classList.remove('hidden');
        formUp.classList.add('hidden');
        tabIn.className = 'flex-1 py-2 rounded-md text-sm font-semibold bg-blue-600 text-white';
        tabUp.className = 'flex-1 py-2 rounded-md text-sm font-semibold text-gray-600';
      } else {
        formIn.classList.add('hidden');
        formUp.classList.remove('hidden');
        tabIn.className = 'flex-1 py-2 rounded-md text-sm font-semibold text-gray-600';
        tabUp.className = 'flex-1 py-2 rounded-md text-sm font-semibold bg-green-600 text-white';
      }
    }

    function showAuthMsg(text, ok) {
      var el = document.getElementById('authMsg');
      el.textContent = text;
      el.className = 'mt-4 text-sm text-center p-3 rounded ' + (ok ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700');
      el.classList.remove('hidden');
    }

    async function handleSignIn(e) {
      e.preventDefault();
      var result = await sb.auth.signInWithPassword({
        email: document.getElementById('inEmail').value,
        password: document.getElementById('inPass').value
      });
      if (result.error) showAuthMsg('Invalid credentials');
      else initApp();
    }

    async function handleSignUp(e) {
      e.preventDefault();
      var pass = document.getElementById('upPass').value;
      if (pass !== document.getElementById('upPass2').value) return showAuthMsg('Passwords mismatch');
      
      var result = await sb.auth.signUp({
        email: document.getElementById('upEmail').value,
        password: pass
      });
      if (result.error) showAuthMsg(result.error.message);
      else if (result.data.session) initApp();
      else showAuthMsg('Check email to confirm', true);
    }

    async function handleLogout() {
      await sb.auth.signOut();
      location.reload();
    }

    function initApp() {
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      loadData();
    }

    async function loadData() {
      var empRes = await sb.from('employees').select('*').order('name');
      var payRes = await sb.from('payroll_records').select('*').order('year').order('month', {ascending: false});
      var loanRes = await sb.from('loan_transactions').select('*').order('created_at', {ascending: false});
      
      employees = empRes.data || [];
      payrollRecords = payRes.data || [];
      loanTransactions = loanRes.data || [];
      
      showPage('dashboard');
    }

    function showPage(page) {
      document.querySelectorAll('.sidebar-item').forEach(function(b) {
        b.classList.toggle('active', b.dataset.page === page);
      });

      var content = document.getElementById('pageContent');
      if (page === 'dashboard') renderDashboard(content);
      else if (page === 'employees') renderEmployees(content);
      else if (page === 'payroll') renderPayroll(content);
      else if (page === 'loans') renderLoans(content);
      else if (page === 'reports') renderReports(content);
    }

    function renderDashboard(container) {
      var totalPaid = 0;
      payrollRecords.forEach(function(r) { totalPaid += parseFloat(r.net_payable||0); });
      var totalLoans = 0;
      employees.forEach(function(e) { totalLoans += parseFloat(e.loan_balance||0); });
      var activeEmployees = employees.filter(function(e) { return e.status === 'active'; }).length;

      container.innerHTML = '<h1 class="text-2xl font-bold mb-6">Dashboard</h1>' +
        '<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">' +
          '<div class="bg-white rounded-xl shadow p-6"><p class="text-sm text-gray-500 mb-1">Active Employees</p><p class="text-3xl font-bold text-blue-600">' + activeEmployees + '</p></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><p class="text-sm text-gray-500 mb-1">Total Paid</p><p class="text-3xl font-bold text-green-600">$' + totalPaid.toFixed(2) + '</p></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><p class="text-sm text-gray-500 mb-1">Outstanding Loans</p><p class="text-3xl font-bold text-red-600">$' + totalLoans.toFixed(2) + '</p></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><p class="text-sm text-gray-500 mb-1">Records</p><p class="text-3xl font-bold text-purple-600">' + payrollRecords.length + '</p></div>' +
        '</div>';
    }

    function renderEmployees(container) {
      var html = '<div class="flex justify-between items-center mb-6">' +
        '<h1 class="text-2xl font-bold">Employees</h1>' +
        '<div class="flex gap-3">' +
          '<button onclick="showBulkImportModal()" class="bg-gray-100 px-4 py-2 rounded-lg">📥 Bulk Import</button>' +
          '<button onclick="showAddEmployeeModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">➕ Add Employee</button>' +
        '</div></div>' +
        '<div class="bg-white rounded-xl shadow overflow-hidden"><table class="w-full">' +
        '<thead class="bg-gray-50 border-b"><tr>' +
          '<th class="text-left py-3 px-4">Name</th>' +
          '<th class="text-left py-3 px-4">Role</th>' +
          '<th class="text-left py-3 px-4">Salary</th>' +
          '<th class="text-left py-3 px-4">Loan Balance</th>' +
          '<th class="text-left py-3 px-4">Actions</th>' +
        '</tr></thead><tbody>';
      
      employees.forEach(function(emp) {
        html += '<tr class="border-b"><td class="py-3 px-4 font-medium">' + emp.name + '</td>' +
          '<td class="py-3 px-4">' + (emp.role || '-') + '</td>' +
          '<td class="py-3 px-4">$' + parseFloat(emp.base_salary).toFixed(2) + '</td>' +
          '<td class="py-3 px-4 ' + (emp.loan_balance > 0 ? 'text-red-600 font-semibold' : 'text-green-600') + '">$' + parseFloat(emp.loan_balance||0).toFixed(2) + '</td>' +
          '<td class="py-3 px-4"><button onclick="viewEmployeeHistory(\'' + emp.id + '\')" class="text-blue-600 hover:underline text-sm">View History</button></td></tr>';
      });
      
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function showAddEmployeeModal() {
      document.getElementById('modalContent').innerHTML = 
        '<h2 class="text-xl font-bold mb-4">Add Employee</h2>' +
        '<form onsubmit="addEmployee(event)">' +
          '<div class="space-y-4">' +
            '<div><label class="block text-sm font-medium mb-1">Full Name *</label><input name="name" required class="w-full px-3 py-2 border rounded-lg"></div>' +
            '<div><label class="block text-sm font-medium mb-1">Role</label><input name="role" class="w-full px-3 py-2 border rounded-lg"></div>' +
            '<div><label class="block text-sm font-medium mb-1">Base Salary *</label><input name="baseSalary" type="number" step="0.01" required class="w-full px-3 py-2 border rounded-lg"></div>' +
            '<div><label class="block text-sm font-medium mb-1">Status</label><select name="status" class="w-full px-3 py-2 border rounded-lg"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>' +
          '</div>' +
          '<div class="flex gap-3 mt-6">' +
            '<button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Save</button>' +
            '<button type="button" onclick="closeModal()" class="bg-gray-100 px-4 py-2 rounded-lg">Cancel</button>' +
          '</div></form>';
      document.getElementById('modal').classList.remove('hidden');
    }

    function showBulkImportModal() {
      document.getElementById('modalContent').innerHTML = 
        '<h2 class="text-xl font-bold mb-4">Bulk Import CSV</h2>' +
        '<p class="text-sm text-gray-600 mb-3">Upload CSV with columns: name, role, base_salary</p>' +
        '<input type="file" id="csvFile" accept=".csv" class="w-full px-3 py-2 border rounded-lg mb-3">' +
        '<div class="flex gap-3">' +
          '<button onclick="processCSV()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Import</button>' +
          '<button onclick="closeModal()" class="bg-gray-100 px-4 py-2 rounded-lg">Cancel</button>' +
        '</div>';
      document.getElementById('modal').classList.remove('hidden');
    }

    function processCSV() {
      var file = document.getElementById('csvFile').files[0];
      if (!file) return alert('Select a file');
      Papa.parse(file, {
        header: true,
        complete: async function(results) {
          var count = 0;
          for (var i = 0; i < results.data.length; i++) {
            var row = results.data[i];
            if (row.name && row.base_salary) {
              await sb.from('employees').insert({
                name: row.name,
                role: row.role || '',
                base_salary: parseFloat(row.base_salary),
                loan_balance: 0,
                status: 'active'
              });
              count++;
            }
          }
          alert('Imported ' + count + ' employees');
          closeModal();
          loadData();
        }
      });
    }

    async function addEmployee(e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      await sb.from('employees').insert({
        name: fd.get('name'),
        role: fd.get('role'),
        base_salary: parseFloat(fd.get('baseSalary')),
        loan_balance: 0,
        status: fd.get('status')
      });
      closeModal();
      loadData();
    }

    async function deleteEmployee(id) {
      if (!confirm('Delete this employee?')) return;
      await sb.from('employees').delete().eq('id', id);
      loadData();
    }

      var emp = employees.find(function(e) { return e.id === empId; });
      var empPayroll = payrollRecords.filter(function(r) { return r.employee_id === empId; });
      var empLoans = loanTransactions.filter(function(r) { return r.employee_id === empId; });

      var html = '<h2 class="text-xl font-bold mb-4">History: ' + emp.name + '</h2>' +
        '<h3 class="font-semibold mb-3 mt-4">Payroll History</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>' +
          '<th class="text-left py-2 px-3">Month/Year</th><th class="text-left py-2 px-3">Base</th><th class="text-left py-2 px-3">Bonus</th><th class="text-left py-2 px-3">Penalty</th><th class="text-left py-2 px-3">Net</th></tr></thead><tbody>';
      
      empPayroll.forEach(function(r) {
        html += '<tr class="border-b"><td class="py-2 px-3">' + r.month + '/' + r.year + '</td>' +
          '<td>$' + parseFloat(r.base_salary).toFixed(2) + '</td>' +
          '<td class="text-green-600">+$' + parseFloat(r.bonuses||0).toFixed(2) + '</td>' +
          '<td class="text-red-600">-$' + parseFloat(r.penalties||0).toFixed(2) + '</td>' +
          '<td class="font-bold">$' + parseFloat(r.net_payable).toFixed(2) + '</td></tr>';
      });
      
      html += '</tbody></table></div>' +
        '<h3 class="font-semibold mb-3 mt-4">Loan Transactions</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>' +
          '<th class="text-left py-2 px-3">Date</th><th class="text-left py-2 px-3">Type</th><th class="text-left py-2 px-3">Amount</th><th class="text-left py-2 px-3">Balance</th></tr></thead><tbody>';
      
      empLoans.forEach(function(r) {
        html += '<tr class="border-b"><td class="py-2 px-3">' + new Date(r.created_at).toLocaleDateString() + '</td>' +
          '<td>' + r.type + '</td>' +
          '<td>$' + parseFloat(r.amount).toFixed(2) + '</td>' +
          '<td>$' + parseFloat(r.balance_after).toFixed(2) + '</td></tr>';
      });
      
      html += '</tbody></table></div><button onclick="closeModal()" class="mt-6 bg-gray-100 px-4 py-2 rounded-lg">Close</button>';
      document.getElementById('modalContent').innerHTML = html;

        '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">' +
          '<div><label class="block text-sm font-medium mb-2">Employee *</label><select name="employeeId" required class="w-full px-3 py-2 border rounded-lg">' + (empOptions || '<option>No active employees</option>') + '</select></div>' +

    async function submitPayroll(e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      var empId = fd.get('employeeId');
      var emp = employees.find(function(e) { return e.id === empId; });
      
      var month = parseInt(fd.get('month'));
      var year = parseInt(fd.get('year'));
      var bonuses = parseFloat(fd.get('bonuses')) || 0;
      var penalties = parseFloat(fd.get('penalties')) || 0;
      var leavePay = parseFloat(fd.get('leavePay')) || 0;
      var gratuity = parseFloat(fd.get('gratuity')) || 0;
      var otherEarnings = parseFloat(fd.get('otherEarnings')) || 0;
      var loansRepaid = parseFloat(fd.get('loansRepaid')) || 0;
      var otherDeductions = parseFloat(fd.get('otherDeductions')) || 0;
      var loansAdvanced = parseFloat(fd.get('loansAdvanced')) || 0;

      var netPayable = emp.base_salary + bonuses + leavePay + gratuity + otherEarnings - penalties - loansRepaid - otherDeductions;

      var result = await sb.from('payroll_records').upsert({
        employee_id: empId,
        month: month,
        year: year,
        base_salary: emp.base_salary,
        bonuses: bonuses,
        bonuses_desc: fd.get('bonusesDesc'),
        penalties: penalties,
        penalties_desc: fd.get('penaltiesDesc'),
        leave_pay: leavePay,
        leave_pay_desc: fd.get('leavePayDesc'),
        gratuity: gratuity,
        gratuity_desc: fd.get('gratuityDesc'),
        other_earnings: otherEarnings,
        other_earnings_desc: fd.get('otherEarningsDesc'),
        loans_repaid: loansRepaid,
        loans_repaid_desc: fd.get('loansRepaidDesc'),
        other_deductions: otherDeductions,
        other_deductions_desc: fd.get('otherDeductionsDesc'),
        net_payable: netPayable
      }, { onConflict: 'employee_id,month,year' });

      if (result.error) {
        alert('Error: ' + result.error.message);
        return;
      }

      if (loansAdvanced > 0) {
        var currentBalance = emp.loan_balance || 0;
        var newBalance = currentBalance + loansAdvanced - loansRepaid;
        
        await sb.from('loan_transactions').insert({
          employee_id: empId,
          type: 'advanced',
          amount: loansAdvanced,
          description: fd.get('loansAdvancedDesc'),
          balance_after: newBalance
        });

        await sb.from('employees').update({ loan_balance: newBalance }).eq('id', empId);
      } else if (loansRepaid > 0) {
        var currentBalance = emp.loan_balance || 0;
        var newBalance = currentBalance - loansRepaid;
        
        await sb.from('loan_transactions').insert({
          employee_id: empId,
          type: 'repaid',
          amount: loansRepaid,
          description: fd.get('loansRepaidDesc') || 'Loan repayment',
          balance_after: newBalance
        });

        await sb.from('employees').update({ loan_balance: newBalance }).eq('id', empId);
      }

      alert('Saved! Net Payable: $' + netPayable.toFixed(2));
      loadData();
    }

    function renderLoans(container) {
      var totalOutstanding = 0;
      employees.forEach(function(e) { totalOutstanding += parseFloat(e.loan_balance||0); });
      var employeesWithLoans = employees.filter(function(e) { return e.loan_balance > 0; });

      var html = '<h1 class="text-2xl font-bold mb-6">Loan Management</h1>' +
        '<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">' +
          '<div class="bg-white rounded-xl shadow p-6"><p class="text-sm text-gray-500 mb-1">Total Outstanding</p><p class="text-3xl font-bold text-red-600">$' + totalOutstanding.toFixed(2) + '</p></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><p class="text-sm text-gray-500 mb-1">Employees with Loans</p><p class="text-3xl font-bold text-blue-600">' + employeesWithLoans.length + '</p></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><p class="text-sm text-gray-500 mb-1">Transactions</p><p class="text-3xl font-bold text-purple-600">' + loanTransactions.length + '</p></div>' +
        '</div>' +
        '<div class="bg-white rounded-xl shadow overflow-hidden"><table class="w-full">' +
        '<thead class="bg-gray-50 border-b"><tr>' +
          '<th class="text-left py-3 px-4">Employee</th>' +
          '<th class="text-left py-3 px-4">Current Balance</th>' +
          '<th class="text-left py-3 px-4">Total Advanced</th>' +
          '<th class="text-left py-3 px-4">Total Repaid</th>' +
        '</tr></thead><tbody>';
      
      employees.forEach(function(emp) {
        var empLoans = loanTransactions.filter(function(r) { return r.employee_id === emp.id; });
        var totalAdv = 0, totalRep = 0;
        empLoans.forEach(function(r) {
          if (r.type === 'advanced') totalAdv += r.amount;
          else totalRep += r.amount;
        });
        html += '<tr class="border-b"><td class="py-3 px-4 font-medium">' + emp.name + '</td>' +
          '<td class="py-3 px-4 ' + (emp.loan_balance > 0 ? 'text-red-600 font-bold' : 'text-green-600') + '">$' + (emp.loan_balance||0).toFixed(2) + '</td>' +
          '<td class="py-3 px-4 text-red-600">$' + totalAdv.toFixed(2) + '</td>' +
          '<td class="py-3 px-4 text-green-600">$' + totalRep.toFixed(2) + '</td></tr>';
      });
      
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function renderReports(container) {
      container.innerHTML = '<h1 class="text-2xl font-bold mb-6">Reports</h1>' +
        '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">' +
          '<div class="bg-white rounded-xl shadow p-6"><h3 class="font-semibold mb-4">Monthly Payroll Summary</h3><button onclick="exportMonthlyReport()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">📥 Export CSV</button></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><h3 class="font-semibold mb-4">Employee Loan Report</h3><button onclick="exportLoanReport()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">📥 Export CSV</button></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><h3 class="font-semibold mb-4">All Payroll Records</h3><button onclick="exportAllPayroll()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">📥 Export CSV</button></div>' +
          '<div class="bg-white rounded-xl shadow p-6"><h3 class="font-semibold mb-4">All Loan Transactions</h3><button onclick="exportAllLoans()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">📥 Export CSV</button></div>' +
        '</div>';
    }

    function exportMonthlyReport() {
      var csv = 'Month,Year,Employee,Base Salary,Bonuses,Penalties,Leave Pay,Gratuity,Net Payable\n';
      payrollRecords.forEach(function(r) {
        var emp = employees.find(function(e) { return e.id === r.employee_id; });
        csv += r.month + ',' + r.year + ',' + (emp?emp.name:'Unknown') + ',' + r.base_salary + ',' + (r.bonuses||0) + ',' + (r.penalties||0) + ',' + (r.leave_pay||0) + ',' + (r.gratuity||0) + ',' + r.net_payable + '\n';
      });
      downloadCSV(csv, 'monthly-payroll-report.csv');
    }

    function exportLoanReport() {
      var csv = 'Employee,Current Balance,Total Advanced,Total Repaid\n';
      employees.forEach(function(emp) {
        var empLoans = loanTransactions.filter(function(r) { return r.employee_id === emp.id; });
        var totalAdv = 0, totalRep = 0;
        empLoans.forEach(function(r) {
          if (r.type === 'advanced') totalAdv += r.amount;
          else totalRep += r.amount;
        });
        csv += emp.name + ',' + (emp.loan_balance||0) + ',' + totalAdv + ',' + totalRep + '\n';
      });
      downloadCSV(csv, 'loan-report.csv');
    }

    function exportAllPayroll() {
      var csv = 'Month,Year,Employee,Base,Bonuses,Penalties,Leave Pay,Gratuity,Net Payable\n';
      payrollRecords.forEach(function(r) {
        var emp = employees.find(function(e) { return e.id === r.employee_id; });
        csv += r.month + ',' + r.year + ',' + (emp?emp.name:'Unknown') + ',' + r.base_salary + ',' + (r.bonuses||0) + ',' + (r.penalties||0) + ',' + (r.leave_pay||0) + ',' + (r.gratuity||0) + ',' + r.net_payable + '\n';
      });
      downloadCSV(csv, 'all-payroll-records.csv');
    }

    function exportAllLoans() {
      var csv = 'Date,Employee,Type,Amount,Description,Balance After\n';
      loanTransactions.forEach(function(r) {
        var emp = employees.find(function(e) { return e.id === r.employee_id; });
        csv += new Date(r.created_at).toLocaleDateString() + ',' + (emp?emp.name:'Unknown') + ',' + r.type + ',' + r.amount + ',' + (r.description||'') + ',' + r.balance_after + '\n';
      });
      downloadCSV(csv, 'all-loan-transactions.csv');
    }

    function downloadCSV(csv, filename) {
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = window.URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // Init
    (function() {
      sb.auth.getSession().then(function(result) {
        if (result.data && result.data.session) initApp();
      });
    })();
  </script>
</body>
</html>
